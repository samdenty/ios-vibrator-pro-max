<body>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<div id="a"></div>

<input type="range" oninput="navigator.vibrate(100)">
<input value="Try typing" oninput="navigator.vibrate(100)" />
<button onclick="navigator.vibrate([500,500,500,500,500])" style="margin-bottom: 200px">Click me</button>


<button style="anchor-name: --my-anchor">Press -> no vibration blocked by onclick</button>

<label id="label" style="position-anchor: --my-anchor; position: fixed; left: anchor(left); top: anchor(top); bottom: anchor(bottom); right: anchor(right);">
  <input id="input" type="checkbox" switch style="height: 100%; width: 100%;">
</label>

<br/>
<br/>

<button style="anchor-name: --my-anchor2">Press -> vibration not blocked by onclick</button>

<label style="position-anchor: --my-anchor2; position: fixed; left: anchor(left); top: anchor(top); bottom: anchor(bottom); right: anchor(right);">
  <input type="checkbox" switch style="display: none">
</label><br/>



<script type="module" async>

input.addEventListener('touchend', () => {
  input.disabled = true;

</script>
</body>
